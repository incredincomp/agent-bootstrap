# bootstrap-manifest.yaml
# Machine-readable control plane for the agent-bootstrap system.
# Version: 1.0.0
# This file defines what a correctly bootstrapped target repo looks like,
# what behaviors are required and forbidden, and when a bootstrap run is complete.

version: "1.0.0"
bootstrap_version: "0.13.0"

repo:
  name: agent-bootstrap
  purpose: >
    Canonical source-of-truth repository for AI agent bootstrap scaffolding.
    Provides prompts, templates, schemas, and a validation script for initializing
    and operating AI-assisted target repositories.
  type: bootstrap-source

# ─────────────────────────────────────────────
# Files required in THIS bootstrap source repo
# ─────────────────────────────────────────────
bootstrap_repo_required_files:
  - README.md
  - AGENTS.md
  - CHANGELOG.md
  - IMPLEMENTATION_TRACKER.md
  - VERSION
  - bootstrap-manifest.yaml
  - docs/BOOTSTRAP_VERSIONING.md
  - prompts/new-repo-bootstrap.md
  - prompts/existing-repo-discovery.md
  - prompts/resume-work.md
  - prompts/bounded-implementation.md
  - prompts/closeout-and-handoff.md
  - templates/AGENTS.md.template
  - templates/IMPLEMENTATION_TRACKER.md.template
  - templates/bootstrap/BOOTSTRAP_SOURCE.md.template
  - templates/docs/ai/REPO_MAP.md.template
  - templates/docs/ai/SOURCE_REFRESH.md.template
  - templates/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template
  - templates/artifacts/ai/repo_discovery.json.template
  - schemas/implementation_tracker.schema.json
  - schemas/repo_discovery.schema.json
  - scripts/validate_bootstrap.py
  - scripts/apply_bootstrap.py
  - scripts/run_fixture_selftest.py
  - scripts/refresh_bootstrap.py
  - fixtures/targets/minimal-python-service/README.md
  - fixtures/targets/minimal-python-service/conftest.py
  - fixtures/targets/minimal-infra-repo/README.md
  - fixtures/population/minimal-python-service.json
  - fixtures/population/minimal-infra-repo.json
  - fixtures/README.md
  - templates/profiles/python-service/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template
  - templates/profiles/infra-repo/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template
  - templates/profiles/vscode-extension/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template
  - templates/profiles/kubernetes-platform/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template

# ─────────────────────────────────────────────
# Files required in a bootstrapped TARGET repo
# ─────────────────────────────────────────────
target_repo_required_files:
  - path: AGENTS.md
    description: Execution contract for AI agents working in this repo
    template: templates/AGENTS.md.template
    must_be_repo_specific: true

  - path: IMPLEMENTATION_TRACKER.md
    description: Live state file — milestones, decisions, validation, gaps
    template: templates/IMPLEMENTATION_TRACKER.md.template
    must_be_repo_specific: true

  - path: docs/ai/REPO_MAP.md
    description: Human and agent-readable map of the target repository
    template: templates/docs/ai/REPO_MAP.md.template
    must_be_repo_specific: true

  - path: docs/ai/SOURCE_REFRESH.md
    description: Instructions for re-syncing agent knowledge of the repo
    template: templates/docs/ai/SOURCE_REFRESH.md.template
    must_be_repo_specific: true

  - path: docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md
    description: Vendor-specific AI knowledge relevant to this target repo
    template: templates/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template
    must_be_repo_specific: true

  - path: bootstrap/BOOTSTRAP_SOURCE.md
    description: Record of the bootstrap origin — where and when this was bootstrapped
    template: templates/bootstrap/BOOTSTRAP_SOURCE.md.template
    must_be_repo_specific: true

  - path: artifacts/ai/repo_discovery.json
    description: Machine-readable discovery artifact from the bootstrap run
    template: templates/artifacts/ai/repo_discovery.json.template
    must_be_repo_specific: true
    validate_schema: schemas/repo_discovery.schema.json

# ─────────────────────────────────────────────
# Optional files for target repos
# ─────────────────────────────────────────────
target_repo_optional_files:
  - path: docs/ai/DECISIONS.md
    description: Persistent decision log for the target repo
  - path: artifacts/ai/dependency_map.json
    description: Machine-readable dependency map

# ─────────────────────────────────────────────
# Creation and update rules
# ─────────────────────────────────────────────
creation_rules:
  - rule: inspect_before_create
    description: >
      Always inspect the target repo before creating any files.
      Do not invent repo context. Use only evidence found during inspection.

  - rule: use_templates_as_starting_points
    description: >
      Always copy the relevant template from this repo's templates/ directory.
      Fill placeholders with real evidence. Do not leave generic placeholders
      unless the information is genuinely unavailable (record the gap if so).

  - rule: never_overwrite_without_review
    description: >
      If a required file already exists in the target repo, inspect its contents
      before deciding to overwrite or merge. Record the decision in the tracker.

  - rule: record_every_run
    description: >
      Every bootstrap run must update IMPLEMENTATION_TRACKER.md in the target repo
      with the date, agent, files created or updated, and validation status.

# ─────────────────────────────────────────────
# Discovery requirements
# ─────────────────────────────────────────────
discovery_requirements:
  - Identify the primary programming language(s).
  - Identify the build system and package manager.
  - Identify the deployment model (if determinable).
  - Identify existing documentation structure.
  - Identify existing CI/CD configuration.
  - Identify authoritative configuration files.
  - Note any agent-operating files already present.
  - Record all findings in artifacts/ai/repo_discovery.json.

# ─────────────────────────────────────────────
# Forbidden behaviors
# ─────────────────────────────────────────────
forbidden_behaviors:
  - Inventing repo history, decisions, or dependencies not found in evidence.
  - Filling templates with made-up project-specific content.
  - Performing unbounded refactors during a bootstrap run.
  - Skipping the discovery step before creating operating files.
  - Marking bootstrap complete without updating the tracker.
  - Removing or silently renaming authoritative files.
  - Adding external dependencies without recording the decision.
  - Creating speculative or non-functional scaffolding code.

# ─────────────────────────────────────────────
# Required output summary expectations
# ─────────────────────────────────────────────
required_output_summary:
  every_run_must_produce:
    - List of files created and updated
    - List of key decisions made with rationale
    - Validation results (what was checked, what passed, what failed)
    - List of unresolved gaps or open questions
    - Recommended next bounded milestone

  format: >
    The summary must be written into IMPLEMENTATION_TRACKER.md in the target repo.
    It must be readable by a future agent or human with no chat history.

# ─────────────────────────────────────────────
# Apply path configuration
# Drives scripts/apply_bootstrap.py behavior
# ─────────────────────────────────────────────
apply:
  script: scripts/apply_bootstrap.py
  bootstrap_marker: bootstrap/BOOTSTRAP_SOURCE.md
  overwrite_default: false
  dry_run_supported: true

  # Template → target-path mappings used by apply_bootstrap.py.
  # source: path relative to the bootstrap repo root.
  # destination: path relative to the target repo root.
  template_mappings:
    - source: templates/AGENTS.md.template
      destination: AGENTS.md
      description: Execution contract for AI agents

    - source: templates/IMPLEMENTATION_TRACKER.md.template
      destination: IMPLEMENTATION_TRACKER.md
      description: Live state file — milestones, decisions, validation

    - source: templates/docs/ai/REPO_MAP.md.template
      destination: docs/ai/REPO_MAP.md
      description: Human + agent-readable repository map

    - source: templates/docs/ai/SOURCE_REFRESH.md.template
      destination: docs/ai/SOURCE_REFRESH.md
      description: Instructions for re-syncing agent knowledge

    - source: templates/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template
      destination: docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md
      description: Vendor-specific AI knowledge base

    - source: templates/bootstrap/BOOTSTRAP_SOURCE.md.template
      destination: bootstrap/BOOTSTRAP_SOURCE.md
      description: Bootstrap origin marker (partially rendered by apply script)

    - source: templates/artifacts/ai/repo_discovery.json.template
      destination: artifacts/ai/repo_discovery.json
      description: Machine-readable discovery artifact

  # Placeholders that apply_bootstrap.py fills automatically in the marker file.
  # All other {{PLACEHOLDER}} markers in templates remain for agent population.
  auto_filled_placeholders:
    - BOOTSTRAP_SOURCE_REPO
    - BOOTSTRAP_SOURCE_VERSION
    - BOOTSTRAP_SOURCE_REVISION
    - BOOTSTRAP_DATE
    - BOOTSTRAP_AGENT
    - BOOTSTRAP_PROMPT_USED
    - BOOTSTRAP_PROFILE

# ─────────────────────────────────────────────
# Refresh / upgrade path configuration
# Drives scripts/refresh_bootstrap.py behavior
# ─────────────────────────────────────────────
refresh:
  script: scripts/refresh_bootstrap.py
  bootstrap_marker: bootstrap/BOOTSTRAP_SOURCE.md
  dry_run_supported: true
  force_supported: true

  # Default behavior is safe — populated files are never overwritten without --force.
  default_safe: true

  # Per-file refresh classification policies.
  # safe-if-unpopulated : refresh when file still has unfilled {{PLACEHOLDER}} markers
  # manual-review       : populated repo-specific file; skip by default
  # marker              : bootstrap origin marker; rendered before comparison
  file_policies:
    - destination: AGENTS.md
      refresh_policy: safe-if-unpopulated
      reason: Structural scaffold; safe to update if agent has not yet populated it

    - destination: IMPLEMENTATION_TRACKER.md
      refresh_policy: manual-review
      reason: Always populated immediately; contains live project state

    - destination: docs/ai/REPO_MAP.md
      refresh_policy: safe-if-unpopulated
      reason: Structural scaffold; safe to update if agent has not yet populated it

    - destination: docs/ai/SOURCE_REFRESH.md
      refresh_policy: safe-if-unpopulated
      reason: Structural scaffold; safe to update if agent has not yet populated it

    - destination: docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md
      refresh_policy: safe-if-unpopulated
      reason: Structural scaffold; safe to update if agent has not yet populated it

    - destination: bootstrap/BOOTSTRAP_SOURCE.md
      refresh_policy: marker
      reason: Bootstrap origin marker; bootstrap-system fields refreshed automatically

    - destination: artifacts/ai/repo_discovery.json
      refresh_policy: manual-review
      reason: Always populated during bootstrap; contains real discovery findings

  # Classification outcomes and their default actions:
  #   missing       → created (always safe)
  #   unchanged     → skipped (already current)
  #   safe-refresh  → refreshed (template updated; no local content to lose)
  #   populated     → skipped and flagged (requires --force to overwrite)

# ─────────────────────────────────────────────────────────────────────────────
# Bootstrap profiles
# Drives profile-aware apply and refresh behavior.
#
# Each profile has:
#   description        : human-readable purpose statement
#   template_overrides : map of destination path → profile-specific source template
#                        (relative to bootstrap repo root)
#
# The common/core template mappings (under apply.template_mappings) are applied
# first for all profiles.  template_overrides replaces the source for specific
# destinations.  An empty template_overrides means "use all common templates".
#
# Refresh reads the current profile from the bootstrap marker and applies the
# same overrides during upgrade.
# ─────────────────────────────────────────────────────────────────────────────
profiles:
  generic:
    description: >
      General-purpose profile. Suitable for any repository not covered by a more
      specific profile. Uses all common/core templates with no overrides.
    template_overrides: {}

  python-service:
    description: >
      Bootstrap profile for Python service repositories. Adds Python-specific
      guidance in the vendor knowledge base (runtime, package management,
      deployment model, Python SDK notes).
    template_overrides:
      docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md:
        source: templates/profiles/python-service/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template

  infra-repo:
    description: >
      Bootstrap profile for infrastructure/platform repositories (e.g., Terraform,
      Pulumi, Ansible, CloudFormation). Adds IaC-specific guidance in the vendor
      knowledge base (provider config, state management, tool version constraints).
    template_overrides:
      docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md:
        source: templates/profiles/infra-repo/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template

  vscode-extension:
    description: >
      Bootstrap profile for VS Code extension repositories. Adds extension-specific
      guidance in the vendor knowledge base (VS Code API version, activation events,
      contribution points, marketplace publishing).
    template_overrides:
      docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md:
        source: templates/profiles/vscode-extension/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template

  kubernetes-platform:
    description: >
      Bootstrap profile for Kubernetes platform and operator repositories. Adds
      platform-specific guidance in the vendor knowledge base (operator framework,
      CRD API versions, RBAC requirements, cluster compatibility).
    template_overrides:
      docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md:
        source: templates/profiles/kubernetes-platform/docs/ai/AI_AGENT_VENDOR_KNOWLEDGE_BASE.md.template

# ─────────────────────────────────────────────
# End-to-end fixture self-test configuration
# ─────────────────────────────────────────────
fixtures:
  runner: scripts/run_fixture_selftest.py
  targets_dir: fixtures/targets
  population_dir: fixtures/population

  fixture_states:
    state_a: raw fixture — no bootstrap files present
    state_b: scaffold applied — placeholders present (expected)
    state_c: minimally populated — all placeholders filled; validation passes

  fixtures:
    - name: minimal-python-service
      shape: code-oriented (Python service)
      profile: python-service
      target_dir: fixtures/targets/minimal-python-service
      population_file: fixtures/population/minimal-python-service.json

    - name: minimal-infra-repo
      shape: infrastructure/docs-oriented (Terraform)
      profile: infra-repo
      target_dir: fixtures/targets/minimal-infra-repo
      population_file: fixtures/population/minimal-infra-repo.json

  safety:
    - Canonical fixture directories are never mutated during test runs.
    - All operations use temporary working copies.
    - Working copies are removed after each run unless --keep-work-dir is passed.

# ─────────────────────────────────────────────
# Stop condition for a target-repo bootstrap run
# ─────────────────────────────────────────────
stop_condition:
  description: >
    A target-repo bootstrap run is complete when all of the following are true:
  criteria:
    - All target_repo_required_files are present and repo-specific (no unfilled generic placeholders).
    - artifacts/ai/repo_discovery.json is populated with real findings.
    - IMPLEMENTATION_TRACKER.md records the run with files, decisions, and validation status.
    - validate_bootstrap.py (or equivalent checks) has been run and the result recorded.
    - No forbidden behaviors were performed (confirm via self-review).
    - The repo is resumable by a future agent with no chat history.
